name: Build PyInstaller App For All Targets

on:
  push:
    tags:
      - 'v*' # Triggers on v1, v2.0, v1.0.0, etc.

jobs:
  build-windows:
    runs-on: windows-latest
    
    permissions: 
      contents: write

    steps:
    - uses: actions/checkout@v4
      with: 
        submodules: recursive
        fetch-depth: 0
        
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Locate site-packages (Windows)
      shell: pwsh
      run: |
        $site = uv run python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])"
        echo "SITE_PKG=$site" >> $env:GITHUB_ENV

    - name: Build with nicegui-pack (Windows)
      shell: pwsh
      # Windows uses $env:PYTHONPATH and ';' as separators
      env:
        PYTHONPATH: "src;bindtools/src"
      run: |
        uv run nicegui-pack --onefile --name "bindmc" src/bindmc/main.py `
          --add-data "$env:SITE_PKG\arviz\static;arviz/static" `
          --add-data "$env:SITE_PKG\arviz\data;arviz/data" `
          --add-data "$env:SITE_PKG\latex2mathml\unimathsymbols.txt;latex2mathml" `
          --add-data "src\bindmc\webgui\default_models.json;webgui" 
      
    - name: Rename binary with Tag
      shell: bash
      run: |
        # github.ref_name contains the tag name (e.g., v1.0.3)
        mv dist/bindmc.exe dist/bindmc-${{ github.ref_name }}-windows64.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: bindmc-executable-windows
        path: dist/bindmc-${{ github.ref_name }}-windows64.exe

    - name: Upload Binary to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
         files: |
           dist/bindmc-${{ github.ref_name }}-windows64.exe

  build-linux:
    runs-on: ubuntu-latest
    permissions: 
      contents: write
    steps:
    - uses: actions/checkout@v4
      with: 
        submodules: recursive
        fetch-depth: 0

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Locate site-packages (Linux)
      shell: bash
      run: |
        SITE_PKG=$(uv run python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
        echo "SITE_PKG=$SITE_PKG" >> $GITHUB_ENV

    - name: Build with nicegui-pack (Linux)
      shell: bash
      env:
        PYTHONPATH: "src:bindtools/src"
      run: |
        uv run nicegui-pack --onefile --name "bindmc" src/bindmc/main.py \
          --add-data "$SITE_PKG/arviz/static:arviz/static" \
          --add-data "$SITE_PKG/arviz/data:arviz/data" \
          --add-data "$SITE_PKG/latex2mathml/unimathsymbols.txt:latex2mathml" \
          --add-data "src/bindmc/webgui/default_models.json:webgui" 
   

    - name: Rename binary with Tag
      shell: bash
      run: |
        # github.ref_name contains the tag name (e.g., v1.0.3)
        mv dist/bindmc dist/bindmc-${{ github.ref_name }}-linux64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: bindmc-executable-windows
        path: dist/bindmc-${{ github.ref_name }}-linux64

    - name: Upload Binary to GitHub Release
      uses: softprops/action-gh-release@v2
