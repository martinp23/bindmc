name: Cross-Platform Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Enables the manual run button in the GitHub UI
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 3
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 
         
      - name: Set up uv environment
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Ensure correct Python version is active
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies and run tests
        run: uv run pytest

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.os }}-py${{ matrix.python-version }}
          path: screenshots/
          if-no-files-found: ignore

